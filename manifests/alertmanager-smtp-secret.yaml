---
# Secret for AlertManager SMTP credentials.
# Create this in your cluster BEFORE deploying the Helm chart.
#
# Usage:
#   kubectl create secret generic alertmanager-smtp-secret \
#     --from-literal=smtp-password='YOUR_GMAIL_APP_PASSWORD' \
#     -n lang-learn
#
# Or apply this file after filling in the base64-encoded password:
#   echo -n 'your-app-password' | base64
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-smtp-secret
  namespace: lang-learn
type: Opaque
stringData:
  # Replace with your Gmail App Password.
  # Do NOT commit the real password to git — use kubectl create secret instead.
  smtp-password: "REPLACE_WITH_GMAIL_APP_PASSWORD"
