---
# ConfigMap that auto-loads all Grafana dashboards via the Grafana sidecar.
#
# Apply:
#   kubectl apply -f manifests/grafana-dashboards-configmap.yaml -n lang-learn
#
# Requirements:
#   kube-prometheus-stack must be deployed with:
#     grafana.sidecar.dashboards.enabled=true
#     grafana.sidecar.dashboards.label=grafana_dashboard
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: lang-learn-grafana-dashboards
  namespace: lang-learn
  labels:
    grafana_dashboard: "1"   # picked up by the Grafana sidecar
data:
  lang-learn-overview.json: |
    {
      "__inputs": [],
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"}
      ],
      "annotations": {"list": []},
      "description": "Lang-Learn - Overview: requests, CEFR score, latency, errors, tokens, pods.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "options": {"tooltip": {"mode": "single"}},
          "targets": [
            {
              "expr": "sum(rate(lang_learn_requests_total[5m]))",
              "legendFormat": "req/s",
              "refId": "A"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.60},
                  {"color": "green", "value": 0.75}
                ]
              },
              "unit": "percentunit",
              "min": 0,
              "max": 1
            },
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [
            {
              "expr": "avg(lang_learn_cefr_match_score)",
              "legendFormat": "Avg CEFR Score",
              "refId": "A"
            }
          ],
          "title": "Avg CEFR Match Score",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "options": {},
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(lang_learn_latency_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(lang_learn_latency_seconds_bucket[5m]))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(lang_learn_latency_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "title": "Latency (p50 / p95 / p99)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 0, "y": 6},
          "id": 4,
          "targets": [
            {
              "expr": "rate(lang_learn_requests_total{status=\"error\"}[5m]) / rate(lang_learn_requests_total[5m]) * 100",
              "legendFormat": "Error %",
              "refId": "A"
            }
          ],
          "title": "Error Rate %",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 8, "y": 6},
          "id": 5,
          "targets": [
            {
              "expr": "rate(lang_learn_tokens_generated_total[1m]) * 60",
              "legendFormat": "tokens/min",
              "refId": "A"
            }
          ],
          "title": "Tokens Generated per Minute",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 6, "w": 8, "x": 16, "y": 6},
          "id": 6,
          "targets": [
            {
              "expr": "lang_learn_gpu_memory_bytes",
              "legendFormat": "GPU Memory",
              "refId": "A"
            }
          ],
          "title": "GPU Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 12},
          "id": 7,
          "targets": [
            {
              "expr": "kube_pod_info{namespace=\"lang-learn\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Pod Status",
          "type": "table"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 38,
      "tags": ["lang-learn", "overview"],
      "title": "Lang-Learn - Overview",
      "uid": "lang-learn-overview",
      "version": 1
    }

  lang-learn-cefr-quality.json: |
    {
      "__inputs": [],
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"}
      ],
      "annotations": {"list": []},
      "description": "Lang-Learn - CEFR Quality: score heatmap, per-level breakdown, mismatch rate, user feedback.",
      "editable": true,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {"calculate": false, "color": {"exponent": 0.5, "mode": "scheme", "scheme": "Oranges"}},
          "targets": [
            {
              "expr": "sum by (le) (rate(lang_learn_cefr_match_score_distribution_bucket[5m]))",
              "legendFormat": "{{le}}",
              "refId": "A"
            }
          ],
          "title": "CEFR Score Heatmap",
          "type": "heatmap"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 2,
          "targets": [
            {
              "expr": "avg by (level) (lang_learn_cefr_match_score)",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ],
          "title": "CEFR Score per Level",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 3,
          "targets": [
            {
              "expr": "avg by (language) (lang_learn_cefr_match_score)",
              "legendFormat": "{{language}}",
              "refId": "A"
            }
          ],
          "title": "CEFR Score per Language",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 4,
          "targets": [
            {
              "expr": "rate(lang_learn_cefr_mismatches_total[1h]) / rate(lang_learn_requests_total[1h])",
              "legendFormat": "{{level}}",
              "refId": "A"
            }
          ],
          "title": "Mismatch Rate per Level",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 5,
          "options": {"pieType": "pie"},
          "targets": [
            {
              "expr": "sum by (rating) (rate(lang_learn_user_feedback_total[1h]))",
              "legendFormat": "{{rating}}",
              "refId": "A"
            }
          ],
          "title": "User Feedback (Up vs Down)",
          "type": "piechart"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "id": 6,
          "targets": [
            {
              "expr": "min by (level) (lang_learn_cefr_match_score)",
              "legendFormat": "min {{level}}",
              "refId": "A"
            },
            {
              "expr": "avg by (level) (lang_learn_cefr_match_score)",
              "legendFormat": "avg {{level}}",
              "refId": "B"
            },
            {
              "expr": "max by (level) (lang_learn_cefr_match_score)",
              "legendFormat": "max {{level}}",
              "refId": "C"
            }
          ],
          "title": "Score Distribution (min/avg/max per Level)",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 38,
      "tags": ["lang-learn", "cefr", "quality"],
      "title": "Lang-Learn - CEFR Quality",
      "uid": "lang-learn-cefr-quality",
      "version": 1
    }
